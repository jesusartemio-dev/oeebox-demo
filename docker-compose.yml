services:
  db:
    image: postgres:latest
    container_name: oeebox-db
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: oeebox-backend
    depends_on:
      - db
    env_file: ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
